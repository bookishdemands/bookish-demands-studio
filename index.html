<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bookish Demands Studio</title>
  <style>
    :root{
      --bg:#0c0c10;
      --panel:#151523;
      --panel2:#1c1c2e;
      --text:#f2f2f7;
      --muted:#b7b7c9;
      --accent:#E0009A;
      --accent2:#7c3aed;
      --line:#2a2a3f;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(224,0,154,.16), transparent 60%),
        radial-gradient(1000px 700px at 85% 10%, rgba(124,58,237,.12), transparent 60%),
        var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 18px 40px;
    }
    h1{
      margin:0 0 8px;
      font-size:28px;
      letter-spacing:.2px;
      background: linear-gradient(90deg,#ffffff,#ffd3f2);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .sub{
      margin:0 0 20px;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
      max-width:760px;
    }
    .grid{
      display:grid;
      grid-template-columns: 460px 1fr;
      gap:16px;
    }
    @media (max-width: 900px){
      .grid{ grid-template-columns:1fr; }
    }
    .card{
      background: linear-gradient(180deg, rgba(21,21,35,.96), rgba(21,21,35,.78));
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
    }
    h2{
      margin:0 0 14px;
      font-size:15px;
      letter-spacing:.2px;
    }
    label{
      display:block;
      margin:0 0 6px;
      font-size:12px;
      color:var(--muted);
    }
    select, textarea, button, input{
      width:100%;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      padding:11px 12px;
      font-size:14px;
    }
    input{
      margin:6px 0 12px;
    }
    textarea{
      min-height:520px;
      resize:vertical;
      line-height:1.55;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    button{
      cursor:pointer;
      font-weight:700;
    }
    button.primary{
      background: linear-gradient(90deg, rgba(224,0,154,1), rgba(124,58,237,1));
      border:0;
    }
    .note{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
      margin-top:8px;
    }
    .spacer{ height:14px; }
    .hidden{ display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bookish Demands Studio</h1>
    <p class="sub">
      Character Studio and Sticker Studio in one workspace.
      Build branded prompts faster with modular controls, overrides, and output tools.
    </p>

    <div class="grid">
      <section class="card">
        <h2>Studio Controls</h2>

        <label for="studioMode">Studio Mode</label>
        <select id="studioMode">
          <option value="character" selected>Character Studio</option>
          <option value="sticker">Sticker Studio</option>
        </select>

        <div class="spacer"></div>

        <div id="characterControls">
          <label for="archetypeSelect">Choose Archetype</label>
          <select id="archetypeSelect"></select>

          <label for="complexionSelect">Complexion</label>
          <select id="complexionSelect"></select>
          <input id="complexionCustom" type="text" placeholder="Custom complexion..." />

          <label for="bodyTypeSelect">Body Type</label>
          <select id="bodyTypeSelect"></select>
          <input id="bodyTypeCustom" type="text" placeholder="Custom body type..." />

          <label for="faceShapeSelect">Face Shape</label>
          <select id="faceShapeSelect"></select>
          <input id="faceShapeCustom" type="text" placeholder="Custom face shape..." />

          <label for="hairSelect">Hair</label>
          <select id="hairSelect"></select>
          <input id="hairCustom" type="text" placeholder="Custom hair..." />

          <label for="outfitSelect">Outfit</label>
          <select id="outfitSelect"></select>
          <input id="outfitCustom" type="text" placeholder="Custom outfit..." />

          <label for="expressionSelect">Expression</label>
          <select id="expressionSelect"></select>
          <input id="expressionCustom" type="text" placeholder="Custom expression..." />

          <label for="microSelect">Micro Expression</label>
          <select id="microSelect"></select>
          <input id="microCustom" type="text" placeholder="Custom micro expression..." />

          <label for="attitudeSelect">Attitude</label>
          <select id="attitudeSelect"></select>
          <input id="attitudeCustom" type="text" placeholder="Custom attitude..." />

          <label for="poseSelect">Pose</label>
          <select id="poseSelect"></select>
          <input id="poseCustom" type="text" placeholder="Custom pose..." />

          <label for="propSelect">Prop</label>
          <select id="propSelect"></select>
          <input id="propCustom" type="text" placeholder="Custom prop..." />

          <label for="sceneSelect">Scene</label>
          <select id="sceneSelect"></select>
          <input id="sceneCustom" type="text" placeholder="Custom scene..." />

          <label for="paletteSelect">Palette</label>
          <select id="paletteSelect"></select>
          <input id="paletteCustom" type="text" placeholder="Custom palette..." />

          <div class="btnrow">
            <button id="randomArchetypeBtn" type="button">Random Archetype</button>
            <button id="randomizeAllBtn" type="button">Randomize All</button>
            <button id="resetBtn" type="button">Reset Defaults</button>
            <button id="clearBtn" type="button">Clear All</button>
            <button id="generateBtn" class="primary" type="button">Generate Character Prompt</button>
            <button id="generate5Btn" type="button">Generate 5 Variations</button>
          </div>
        </div>

        <div id="stickerControls" class="hidden">
  <label for="stickerSubMode">Sticker Studio Mode</label>
  <select id="stickerSubMode">
    <option value="sticker" selected>Sticker</option>
    <option value="kindle">Kindle Insert</option>
  </select>

  <div class="spacer"></div>

  <div id="stickerModeControls">
    <label for="stickerProductSelect">Sticker Product</label>
    <select id="stickerProductSelect"></select>
    <input id="stickerProductCustom" type="text" placeholder="Custom sticker product..." />

    <label for="stickerQuoteBankSelect">Quote Bank</label>
<select id="stickerQuoteBankSelect">
  <option value="general" selected>General</option>
  <option value="darkRomance">Dark Romance</option>
  <option value="funny">Funny / Sarcastic</option>
  <option value="urban">Urban Fiction</option>
  <option value="softLife">Soft Life</option>
  <option value="morallyGray">Morally Gray</option>
</select>
    
    <label for="stickerQuoteInput">Main Quote</label>
    <input id="stickerQuoteInput" type="text" placeholder="Enter main quote..." />

    <label for="stickerMicroQuoteInput">Micro Quote</label>
    <input id="stickerMicroQuoteInput" type="text" placeholder="Enter micro quote..." />

    <label for="stickerVibeSelect">Vibe</label>
    <select id="stickerVibeSelect"></select>
    <input id="stickerVibeCustom" type="text" placeholder="Custom vibe..." />

    <label for="stickerPaletteSelect">Palette</label>
    <select id="stickerPaletteSelect"></select>
    <input id="stickerPaletteCustom" type="text" placeholder="Custom sticker palette..." />

    <label for="stickerBackgroundSelect">Background</label>
    <select id="stickerBackgroundSelect"></select>

    <label for="stickerBorderSelect">Border</label>
    <select id="stickerBorderSelect"></select>

    <label for="stickerOutlineSelect">Outline</label>
    <select id="stickerOutlineSelect"></select>

    <label for="stickerSpiceSelect">Spice Level</label>
    <select id="stickerSpiceSelect"></select>

    <div class="btnrow">
      <button id="randomStickerBtn" type="button">Random Sticker</button>
      <button id="resetStickerBtn" type="button">Reset Sticker</button>
      <button id="clearStickerBtn" type="button">Clear Sticker</button>
      <button id="generateStickerBtn" class="primary" type="button">Generate Sticker Prompt</button>
      <button id="generate5StickerBtn" type="button">Generate 5 Stickers</button>
    </div>
  </div>

  <div id="kindleModeControls" class="hidden">
    <label for="kindleQuoteInput">Main Quote</label>
    <input id="kindleQuoteInput" type="text" placeholder="Enter main insert quote..." />

    <label for="kindleMicroQuoteInput">Micro Quote</label>
    <input id="kindleMicroQuoteInput" type="text" placeholder="Enter supporting micro quote..." />

    <label for="kindleThemeSelect">Insert Theme</label>
    <select id="kindleThemeSelect"></select>
    <input id="kindleThemeCustom" type="text" placeholder="Custom insert theme..." />

    <label for="kindlePaletteSelect">Palette</label>
    <select id="kindlePaletteSelect"></select>
    <input id="kindlePaletteCustom" type="text" placeholder="Custom insert palette..." />

    <label for="kindleBackgroundSelect">Background</label>
    <select id="kindleBackgroundSelect"></select>

    <label for="kindleLayoutSelect">Layout Style</label>
    <select id="kindleLayoutSelect"></select>

    <label for="kindleHeatSelect">Heat Level</label>
    <select id="kindleHeatSelect"></select>

    <label for="kindleExtraInput">Optional Image / Object Note</label>
    <input id="kindleExtraInput" type="text" placeholder="Example: luxury perfume bottle, dark floral border, e-reader corner..." />

    <div class="btnrow">
      <button id="randomKindleBtn" type="button">Random Insert</button>
      <button id="resetKindleBtn" type="button">Reset Insert</button>
      <button id="clearKindleBtn" type="button">Clear Insert</button>
      <button id="generateKindleBtn" class="primary" type="button">Generate Kindle Insert Prompt</button>
      <button id="generate5KindleBtn" type="button">Generate 5 Inserts</button>
    </div>
  </div>
</div>

        <div class="note">
          Character mode uses archetype DNA. Sticker mode uses quote + product + vibe logic.
        </div>
      </section>

      <section class="card">
        <h2>Prompt Output</h2>
        <div class="btnrow" style="margin-top:0;margin-bottom:12px;">
          <button id="copyBtn" type="button">Copy Prompt</button>
          <button id="clearOutputBtn" type="button">Clear Output</button>
        </div>
        <textarea id="output" readonly placeholder="Generated prompt will appear here..."></textarea>
      </section>
    </div>
  </div>

  <script type="module" src="./js/app.js?v=58"></script>
</body>
</html>
